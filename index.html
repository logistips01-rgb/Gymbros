<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GymBros · Progreso compartido</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#E11D2E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GymBros">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0A1628;
  --surface: #111f38;
  --surface2: #0d1a30;
  --border: #1e3558;
  --accent: #E11D2E;
  --accent-dim: rgba(225,29,46,0.15);
  --accent-hover: #ff2b3d;
  --blue-deep: #070f1e;
  --silver: #7a94b8;
  --text: #e8f0fa;
  --muted: #7a94b8;
  --r: 10px;
  --u0: #E11D2E;
  --u1: #2563EB;
  --u2: #16a34a;
  --u3: #d97706;
}
body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; font-size:14px; }

/* ── LOADING ── */
#loading {
  position:fixed; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:999; gap:16px;
}
#loading .logo-spin {
  font-family:'Barlow Condensed',sans-serif; font-weight:900;
  font-size:42px; letter-spacing:5px; color:#fff;
}
#loading .logo-spin span { color:var(--accent); }
.spinner {
  width:32px; height:32px; border:3px solid var(--border);
  border-top-color:var(--accent); border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
#loading p { font-size:12px; color:var(--muted); letter-spacing:1px; }

/* ── SCREENS ── */
.screen { display:none; }
.screen.active { display:block; }
#screen-login.active { display:flex; }

/* ── LOGIN ── */
#screen-login {
  flex-direction:column; align-items:center; justify-content:flex-start;
  min-height:100vh; padding:40px 20px;
  background:radial-gradient(ellipse at top, #1a2f52 0%, var(--bg) 65%);
}
.logo-big {
  font-family:'Barlow Condensed',sans-serif; font-weight:900;
  font-size:52px; letter-spacing:5px; color:#fff; line-height:1;
  text-shadow:0 0 40px rgba(225,29,46,0.35); margin-bottom:4px;
}
.logo-big span { color:var(--accent); }
.tagline { color:rgba(255,255,255,0.35); font-size:11px; letter-spacing:4px; text-transform:uppercase; margin-bottom:36px; white-space:nowrap; }

.login-box {
  background:var(--surface); border:1px solid var(--border);
  border-radius:18px; padding:24px; width:100%; max-width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}
.login-box h2 {
  font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13px;
  letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:16px;
}
.profiles-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; margin-bottom:20px; }
.profile-btn {
  display:flex; flex-direction:column; align-items:center; gap:10px;
  background:var(--surface2); border:2px solid var(--border);
  border-radius:14px; padding:18px 12px; cursor:pointer;
  transition:border-color .2s, background .2s, transform .15s;
  text-align:center; color:var(--text); position:relative;
}
.profile-btn:hover { transform:translateY(-2px); }
.pav {
  width:52px; height:52px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:22px; color:#fff;
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
}
.pname { font-weight:700; font-size:15px; color:var(--text); }
.psub { font-size:11px; color:var(--muted); }
.profile-btn .del-btn {
  position:absolute; top:7px; right:7px;
  width:22px; height:22px; padding:0;
  display:flex; align-items:center; justify-content:center;
  background:var(--surface); border:1px solid var(--border); border-radius:6px;
  cursor:pointer; color:var(--muted); transition:all .2s; opacity:0;
}
.profile-btn:hover .del-btn { opacity:1; }
.profile-btn .del-btn:hover { border-color:var(--accent); color:var(--accent); }

.slot-empty {
  display:flex; flex-direction:column; align-items:center; gap:8px;
  background:transparent; border:2px dashed var(--border);
  border-radius:14px; padding:18px 12px;
  cursor:pointer; transition:border-color .2s, color .2s; color:var(--muted);
  min-height:120px; justify-content:center;
}
.slot-empty:hover { border-color:var(--accent); color:var(--accent); }
.slot-empty span { font-size:22px; }
.slot-empty small { font-size:12px; font-weight:600; }

.divider { display:flex; align-items:center; gap:10px; margin:4px 0 16px; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
.divider span { font-size:11px; color:var(--muted); white-space:nowrap; }
.new-profile-form { display:flex; gap:8px; }

/* ── INPUTS & BUTTONS ── */
input[type="text"],input[type="number"],select {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--r); padding:9px 12px; color:var(--text);
  font-family:'Inter',sans-serif; font-size:14px; outline:none; transition:border-color .2s;
}
input[type="text"]:focus,input[type="number"]:focus,select:focus { border-color:var(--accent); }
input::placeholder { color:var(--muted); }
.btn { padding:9px 16px; border-radius:var(--r); border:none; cursor:pointer; font-family:'Inter',sans-serif; font-weight:600; font-size:14px; transition:all .2s; white-space:nowrap; }
.btn-accent { background:var(--accent); color:#fff; }
.btn-accent:hover { background:var(--accent-hover); transform:translateY(-1px); box-shadow:0 4px 12px rgba(225,29,46,0.3); }
.btn-ghost { background:transparent; color:var(--text); border:1px solid var(--border); }
.btn-ghost:hover { border-color:var(--accent); color:var(--accent); }
.btn-sm { padding:6px 12px; font-size:12px; }
.btn-icon {
  width:30px; height:30px; padding:0; display:flex; align-items:center; justify-content:center;
  background:var(--surface2); border:1px solid var(--border); border-radius:7px;
  cursor:pointer; color:var(--muted); transition:all .2s;
}
.btn-icon:hover { border-color:var(--accent); color:var(--accent); }

/* ── HEADER ── */
header {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 20px; border-bottom:2px solid var(--accent);
  position:sticky; top:0; z-index:100;
  background:var(--blue-deep); backdrop-filter:blur(8px);
}
.logo { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:22px; letter-spacing:3px; color:#fff; }
.logo span { color:var(--accent); }
.header-right { display:flex; align-items:center; gap:8px; }
.user-pill {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15);
  border-radius:50px; padding:5px 12px 5px 6px;
}
.uav {
  width:26px; height:26px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:12px; color:#fff;
}
.uname { font-size:13px; font-weight:600; color:#fff; }
.switch-btn {
  background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15);
  border-radius:8px; padding:5px 10px; color:var(--muted); font-size:11px; font-weight:600;
  cursor:pointer; transition:all .2s;
}
.switch-btn:hover { border-color:var(--accent); color:var(--accent); }

/* ── LIVE BADGE ── */
.live-badge {
  display:inline-flex; align-items:center; gap:5px;
  background:rgba(22,163,74,0.15); border:1px solid rgba(22,163,74,0.3);
  border-radius:50px; padding:3px 10px; font-size:11px; font-weight:600; color:#4ade80;
}
.live-dot {
  width:6px; height:6px; background:#4ade80; border-radius:50%;
  animation:pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── MAIN ── */
#screen-main { max-width:900px; margin:0 auto; padding:20px 16px 80px; }

/* ── TABS ── */
.tabs {
  display:flex; gap:3px; background:var(--surface);
  border:1px solid var(--border); border-radius:11px; padding:3px; margin-bottom:22px;
}
.tab-btn {
  flex:1; padding:9px 6px; background:transparent; border:none; border-radius:8px;
  color:var(--muted); font-family:'Barlow Condensed',sans-serif;
  font-weight:700; font-size:14px; letter-spacing:1px; text-transform:uppercase;
  cursor:pointer; transition:all .2s;
}
.tab-btn.active { background:var(--accent); color:#fff; }
.tab-btn:not(.active):hover { color:var(--text); }
.tab-panel { display:none; }
.tab-panel.active { display:block; }

/* ── SECTION ── */
.sec-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.sec-title { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:18px; letter-spacing:1px; text-transform:uppercase; }
.breadcrumb { display:flex; align-items:center; gap:6px; margin-bottom:18px; font-size:12px; color:var(--muted); }
.bc-link { cursor:pointer; transition:color .2s; font-weight:600; }
.bc-link:hover { color:var(--accent); }
.bc-sep { color:var(--border); }
.bc-current { color:var(--text); font-weight:600; }

/* ── MUSCLE GRID ── */
.muscle-grid-view { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
.muscle-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:18px 14px;
  cursor:pointer; transition:border-color .2s, transform .15s, box-shadow .2s;
  position:relative; overflow:hidden;
}
.muscle-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 6px 20px rgba(225,29,46,0.12); }
.mc-icon { font-size:28px; margin-bottom:10px; display:block; }
.mc-name { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:17px; }
.mc-count { font-size:11px; color:var(--muted); margin-top:3px; }
.mc-bar { position:absolute; bottom:0; left:0; height:3px; background:var(--accent); border-radius:0 2px 0 0; transition:width .5s ease; }
.muscle-card-add {
  background:transparent; border:2px dashed var(--border);
  border-radius:12px; padding:18px 14px;
  cursor:pointer; transition:border-color .2s, color .2s;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:6px; min-height:110px; color:var(--muted);
}
.muscle-card-add:hover { border-color:var(--accent); color:var(--accent); }
.muscle-card-add span { font-size:24px; }
.muscle-card-add small { font-size:12px; font-weight:600; }

/* ── EXERCISES ── */
.exercise-list { display:flex; flex-direction:column; gap:10px; }
.ex-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r); overflow:hidden; transition:border-color .2s;
}
.ex-card-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 16px; cursor:pointer;
}
.ex-card-header:hover .ex-name { color:var(--accent); }
.ex-left { display:flex; align-items:center; gap:10px; }
.ex-name { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:17px; transition:color .2s; }
.ex-meta { font-size:11px; color:var(--muted); margin-top:2px; }
.ex-right { display:flex; align-items:center; gap:6px; }
.ex-best {
  font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:14px;
  color:#fff; background:var(--accent); padding:3px 9px; border-radius:6px;
}
.ex-chevron { color:var(--muted); font-size:11px; transition:transform .2s; }
.ex-card.open .ex-chevron { transform:rotate(180deg); }
.ex-body { display:none; padding:0 16px 14px; border-top:1px solid var(--border); background:var(--bg); }
.ex-card.open .ex-body { display:block; }

/* ── SESSION FORM ── */
.session-form {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r); padding:12px; margin-top:12px;
}
.session-form h4 {
  font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13px;
  letter-spacing:1px; text-transform:uppercase; margin-bottom:10px;
}
.sets-area { display:flex; flex-direction:column; gap:7px; margin-bottom:9px; }
.set-row { display:grid; grid-template-columns:28px 1fr 1fr 28px; gap:7px; align-items:center; }
.set-num { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13px; color:#fff; text-align:center; }
.set-row input { padding:7px 9px; font-size:13px; }
.form-foot { display:flex; justify-content:space-between; align-items:center; }
.add-set-link { background:none; border:none; color:var(--silver); font-size:12px; cursor:pointer; font-family:'Inter',sans-serif; padding:0; text-decoration:underline; text-underline-offset:3px; font-weight:600; }
.add-set-link:hover { color:var(--accent); }

/* ── SESSION LOG ── */
.sessions-log { margin-top:12px; display:flex; flex-direction:column; gap:6px; }
.session-entry {
  display:flex; align-items:flex-start; justify-content:space-between;
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:9px 11px; gap:10px;
}
.session-date { font-size:11px; color:var(--muted); white-space:nowrap; margin-top:1px; }
.sets-chips { display:flex; flex-wrap:wrap; gap:4px; margin-top:3px; }
.set-chip {
  font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:12px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:4px; padding:2px 7px;
}
.set-chip .w { color:#fff; }

/* ── PROGRESS BARS ── */
.prog-section { margin-top:12px; }
.prog-label {
  display:flex; justify-content:space-between;
  font-size:11px; color:var(--muted); margin-bottom:4px;
  font-family:'Barlow Condensed',sans-serif; font-weight:600; letter-spacing:1px; text-transform:uppercase;
}
.prog-track { height:5px; background:var(--surface2); border-radius:3px; overflow:hidden; margin-bottom:8px; border:1px solid var(--border); }
.prog-fill { height:100%; background:var(--accent); border-radius:3px; transition:width .8s cubic-bezier(.4,0,.2,1); }

/* ── STATS ── */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px; margin-bottom:22px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:16px; }
.stat-v { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:34px; color:#fff; line-height:1; }
.stat-l { font-size:11px; color:var(--muted); margin-top:4px; }
.muscle-stat-item { margin-bottom:10px; }
.mstat-label { display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px; }
.mstat-label span:last-child { color:#fff; font-weight:600; }

/* ── RANKINGS ── */
.ranking-grid { display:flex; flex-direction:column; gap:14px; }
.ranking-section { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px; }
.ranking-section h3 {
  font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:16px;
  letter-spacing:1px; text-transform:uppercase; color:var(--muted);
  margin-bottom:16px; display:flex; align-items:center; gap:8px;
}
.ranking-section h3 span { color:var(--text); }
.rank-row {
  display:flex; align-items:center; gap:12px; padding:10px 0;
  border-bottom:1px solid var(--border);
}
.rank-row:last-child { border-bottom:none; }
.rank-pos { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:22px; width:28px; text-align:center; flex-shrink:0; }
.rank-pos.gold { color:#fbbf24; }
.rank-pos.silver { color:#94a3b8; }
.rank-pos.bronze { color:#cd7f32; }
.rank-av {
  width:34px; height:34px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:15px; color:#fff;
}
.rank-info { flex:1; min-width:0; }
.rank-name { font-weight:700; font-size:14px; }
.rank-sub { font-size:11px; color:var(--muted); margin-top:1px; }
.rank-bar-wrap { margin-top:5px; }
.rank-bar-bg { height:6px; background:var(--surface2); border-radius:3px; overflow:hidden; }
.rank-bar-fill { height:100%; border-radius:3px; transition:width .8s cubic-bezier(.4,0,.2,1); }
.rank-val { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:20px; color:#fff; text-align:right; flex-shrink:0; }
.rank-val small { font-size:11px; font-weight:400; color:var(--muted); display:block; }

/* ── MODAL ── */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(7,15,30,0.75); backdrop-filter:blur(6px);
  z-index:200; align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:26px; width:100%; max-width:400px;
  animation:slideUp .2s ease; box-shadow:0 24px 80px rgba(0,0,0,0.5);
}
@keyframes slideUp { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal h3 { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:20px; margin-bottom:18px; }
.field { margin-bottom:12px; }
.field label { display:block; font-size:11px; color:var(--muted); margin-bottom:5px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; }
.field input,.field select { width:100%; }
.field select { appearance:none; cursor:pointer; }
.modal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:18px; }

/* ── EMPTY ── */
.empty-state { text-align:center; padding:36px 20px; color:var(--muted); }
.empty-state .ei { font-size:38px; margin-bottom:10px; }
.empty-state h3 { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:17px; margin-bottom:5px; color:var(--text); }
.empty-state p { font-size:12px; line-height:1.5; }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
  background:var(--surface); color:#fff; font-weight:700; font-size:12px;
  padding:10px 20px; border-radius:50px; z-index:999; opacity:0; pointer-events:none;
  transition:opacity .3s; font-family:'Barlow Condensed',sans-serif;
  letter-spacing:1px; text-transform:uppercase; white-space:nowrap;
  border:1px solid var(--border); box-shadow:0 8px 24px rgba(0,0,0,0.4);
}
.toast.show { opacity:1; }
</style>
</head>
<body>

<!-- ── LOADING ── -->
<div id="loading">
  <div class="logo-spin">GYM<span>BROS</span></div>
  <div class="spinner"></div>
  <p>Conectando…</p>
</div>

<!-- ── LOGIN SCREEN ── -->
<div id="screen-login" class="screen">
  <div class="logo-big">GYM<span>BROS</span></div>
  <div class="tagline">5 guerreros. 0 excusas.</div>
  <div class="login-box">
    <h2>¿Quién entrena hoy?</h2>
    <div class="profiles-grid" id="profiles-list"></div>
    <div class="divider"><span>O crea un perfil nuevo</span></div>
    <div class="new-profile-form">
      <input type="text" id="new-profile-name" placeholder="Tu nombre" style="flex:1" maxlength="16"
        onkeydown="if(event.key==='Enter')createProfile()">
      <button class="btn btn-accent" onclick="createProfile()">Crear</button>
    </div>
    <p id="profile-limit-msg" style="font-size:11px;color:var(--muted);text-align:center;margin-top:10px;display:none">
      Máximo 5 perfiles alcanzado
    </p>
  </div>
</div>

<!-- ── MAIN SCREEN ── -->
<div id="screen-main" class="screen">
  <header>
    <div class="logo">GYM<span>BROS</span></div>
    <div class="header-right">
      <div class="live-badge"><div class="live-dot"></div>En vivo</div>
      <button class="switch-btn" onclick="logout()">↩ Cambiar</button>
      <div class="user-pill">
        <div class="uav" id="hdr-av">?</div>
        <span class="uname" id="hdr-name">—</span>
      </div>
    </div>
  </header>

  <div id="screen-main-body">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('entrenos')">🏋️ Entrenos</button>
      <button class="tab-btn" onclick="switchTab('stats')">📊 Mis stats</button>
      <button class="tab-btn" onclick="switchTab('rankings')">🏆 Rankings</button>
    </div>

    <!-- ENTRENOS -->
    <div class="tab-panel active" id="tab-entrenos">
      <div id="view-muscles">
        <div class="sec-header">
          <span class="sec-title">Grupos musculares</span>
          <button class="btn btn-accent btn-sm" onclick="openModal('modal-muscle')">+ Grupo</button>
        </div>

      <input type="text" id="ex-name-inp" placeholder="Ej: Press banca" style="width:100%" maxlength="40"
        onkeydown="if(event.key==='Enter')addExercise()">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-ex')">Cancelar</button>
      <button class="btn btn-accent" onclick="addExercise()">Añadir</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ── FIREBASE INIT ─────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBpsgy0zeJVbngBcNKiCq6MrQeNBJxGPB4",
  authDomain: "gymbros-eb4f5.firebaseapp.com",
  projectId: "gymbros-eb4f5",
  storageBucket: "gymbros-eb4f5.firebasestorage.app",
  messagingSenderId: "238966906503",
  appId: "1:238966906503:web:79b731ec6db9afd9952222"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ── CONSTANTS ─────────────────────────────────────────────────
const CU_KEY = 'gymbros_current_user';
const USER_COLORS = ['#E11D2E', '#2563EB', '#16a34a', '#d97706', '#7c3aed'];
const MAX_PROFILES = 5;

// ── STATE (in-memory cache, Firestore is source of truth) ─────
let state = { profiles: [], currentUser: null };
let activeMuscle = null;
let firstLoad = true;

// ── HELPERS ───────────────────────────────────────────────────
function profile() { return state.profiles.find(p => p.id === state.currentUser); }
function colorFor(idx) { return USER_COLORS[idx % USER_COLORS.length]; }
function getUserIdx(id) { return state.profiles.findIndex(p => p.id === id); }

function getCU() { return localStorage.getItem(CU_KEY); }
function setCU(id) { id ? localStorage.setItem(CU_KEY, id) : localStorage.removeItem(CU_KEY); }

// ── FIRESTORE OPERATIONS ──────────────────────────────────────
function saveCurrentProfile() {
  const p = profile();
  if (!p) return;
  db.collection('profiles').doc(p.id).set(p)
    .catch(err => { console.error(err); showToast('Error al guardar ⚠️'); });
}

function saveNewProfile(p) {
  return db.collection('profiles').doc(p.id).set(p);
}

function deleteProfileFromDB(id) {
  return db.collection('profiles').doc(id).delete();
}

// ── REAL-TIME SUBSCRIPTION ────────────────────────────────────
function subscribeToProfiles() {
  db.collection('profiles').onSnapshot(snapshot => {
    state.profiles = snapshot.docs.map(d => d.data());
    // Sort by creation time (id is timestamp-based)
    state.profiles.sort((a, b) => a.id.localeCompare(b.id));

    if (firstLoad) {
      firstLoad = false;
      document.getElementById('loading').style.display = 'none';
      // Restore session
      const cu = getCU();
      if (cu && state.profiles.find(p => p.id === cu)) {
        state.currentUser = cu;
        showMain();
      } else {
        setCU(null);
        showScreen('login');
        renderLogin();
      }
      return;
    }

    // Subsequent updates (another user changed data)
    if (!state.currentUser) {
      renderLogin();
      return;
    }
    // Refresh rankings if visible
    const rankPanel = document.getElementById('tab-rankings');
    if (rankPanel.classList.contains('active')) renderRankings();

  }, err => {
    console.error('Firestore error:', err);
    document.getElementById('loading').innerHTML =
      `<div class="logo-spin">GYM<span>BROS</span></div>
       <p style="color:#E11D2E;font-size:13px">Error de conexión.<br>Revisa las reglas de Firestore.</p>`;
  });
}

// ── SCREENS ───────────────────────────────────────────────────
function showScreen(which) {
  document.getElementById('screen-login').classList.toggle('active', which === 'login');
  document.getElementById('screen-main').classList.toggle('active', which === 'main');
}

// ── LOGIN ─────────────────────────────────────────────────────
function renderLogin() {
  const list = document.getElementById('profiles-list');
  list.innerHTML = '';
  document.getElementById('profile-limit-msg').style.display =
    state.profiles.length >= MAX_PROFILES ? '' : 'none';

  state.profiles.forEach((p, idx) => {
    const sessions = p.muscles.reduce((a, m) => a + m.exercises.reduce((b, e) => b + e.sessions.length, 0), 0);
    const color = colorFor(idx);
    const btn = document.createElement('button');
    btn.className = 'profile-btn';
    btn.style.borderColor = color + '44';
    btn.innerHTML = `
      <div class="pav" style="background:${color}">${p.name[0].toUpperCase()}</div>
      <div class="pname">${p.name}</div>
      <div class="psub">${sessions} sesión${sessions !== 1 ? 'es' : ''}</div>
      <button class="del-btn" onclick="event.stopPropagation();delProfile('${p.id}')">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>`;
    btn.onmouseenter = () => btn.style.borderColor = color;
    btn.onmouseleave = () => btn.style.borderColor = color + '44';
    btn.onclick = () => loginAs(p.id);
    list.appendChild(btn);
  });

  for (let i = state.profiles.length; i < MAX_PROFILES; i++) {
    const slot = document.createElement('div');
    slot.className = 'slot-empty';
    slot.innerHTML = `<span>＋</span><small>Libre</small>`;
    slot.onclick = () => document.getElementById('new-profile-name').focus();
    list.appendChild(slot);
  }
}

async function createProfile() {
  if (state.profiles.length >= MAX_PROFILES) { showToast('Máximo 4 perfiles'); return; }
  const inp = document.getElementById('new-profile-name');
  const name = inp.value.trim();
  if (!name) { showToast('Escribe tu nombre'); return; }
  if (state.profiles.find(p => p.name.toLowerCase() === name.toLowerCase())) {
    showToast('Ese nombre ya existe'); return;
  }
  const p = {
    id: Date.now().toString(),
    name,
    muscles: [
      { id: 'm1', name: 'Pecho',   icon: '🫁', exercises: [] },
      { id: 'm2', name: 'Espalda', icon: '🔙', exercises: [] },
      { id: 'm3', name: 'Hombros', icon: '🔺', exercises: [] },
      { id: 'm4', name: 'Bíceps',  icon: '💪', exercises: [] },
      { id: 'm5', name: 'Tríceps', icon: '🔱', exercises: [] },
      { id: 'm6', name: 'Piernas', icon: '🦵', exercises: [] }
    ]
  };
  try {
    await saveNewProfile(p);
    inp.value = '';
    loginAs(p.id);
  } catch (e) {
    console.error(e);
    showToast('Error al crear perfil ⚠️');
  }
}

function loginAs(id) {
  state.currentUser = id;
  setCU(id);
  showMain();
}

function logout() {
  state.currentUser = null;
  setCU(null);
  showScreen('login');
  renderLogin();
}

async function delProfile(id) {
  if (!confirm('¿Eliminar perfil y todos sus datos?')) return;
  try {
    await deleteProfileFromDB(id);
    if (state.currentUser === id) {
      state.currentUser = null;
      setCU(null);
      showScreen('login');
    }
    // onSnapshot will call renderLogin automatically
  } catch (e) {
    console.error(e);
    showToast('Error al eliminar ⚠️');
  }
}

function showMain() {
  const p = profile();
  if (!p) { showScreen('login'); renderLogin(); return; }
  const color = colorFor(getUserIdx(p.id));
  showScreen('main');
  const av = document.getElementById('hdr-av');
  av.textContent = p.name[0].toUpperCase();
  av.style.background = color;
  document.getElementById('hdr-name').textContent = p.name;
  switchTab('entrenos');
  showMuscleGrid();
}

// ── TABS ──────────────────────────────────────────────────────
function switchTab(tab) {
  const tabs = ['entrenos', 'stats', 'rankings'];
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', tabs[i] === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  if (tab === 'stats') renderStats();
  if (tab === 'rankings') renderRankings();
}

// ── MUSCLE GROUPS ─────────────────────────────────────────────
function showMuscleGrid() {
  activeMuscle = null;
  document.getElementById('view-muscles').style.display = '';
  document.getElementById('view-exercises').style.display = 'none';
  renderMuscleGrid();
}

function renderMuscleGrid() {
  const p = profile();
  const grid = document.getElementById('muscle-grid-view');
  grid.innerHTML = '';
  p.muscles.forEach(m => {
    const sessions = m.exercises.reduce((a, e) => a + e.sessions.length, 0);
    const maxS = Math.max(1, ...p.muscles.map(mm => mm.exercises.reduce((a, e) => a + e.sessions.length, 0)));
    const pct = Math.round((sessions / maxS) * 100);
    const card = document.createElement('div');
    card.className = 'muscle-card';
    card.innerHTML = `
      <span class="mc-icon">${m.icon}</span>
      <div class="mc-name">${m.name}</div>
      <div class="mc-count">${m.exercises.length} ej. · ${sessions} ses.</div>
      <div class="mc-bar" style="width:${pct}%"></div>`;
    card.onclick = () => openMuscleGroup(m.id);
    grid.appendChild(card);
  });
  const addCard = document.createElement('div');
  addCard.className = 'muscle-card-add';
  addCard.innerHTML = `<span>＋</span><small>Nuevo grupo</small>`;
  addCard.onclick = () => openModal('modal-muscle');
  grid.appendChild(addCard);
}

function addMuscleGroup() {
  const sel = document.getElementById('muscle-select');
  const val = sel.value;
  if (!val) { showToast('Selecciona un grupo'); return; }
  const [name, icon] = val.split('|');
  const p = profile();
  if (p.muscles.find(m => m.name === name)) { showToast('Ese grupo ya existe'); return; }
  p.muscles.push({ id: Date.now().toString(), name, icon, exercises: [] });
  saveCurrentProfile();
  closeModal('modal-muscle');
  sel.value = '';
  renderMuscleGrid();
  showToast(`${icon} ${name} añadido`);
}

function openMuscleGroup(muscleId) {
  activeMuscle = muscleId;
  const p = profile();
  const m = p.muscles.find(m => m.id === muscleId);
  document.getElementById('view-muscles').style.display = 'none';
  document.getElementById('view-exercises').style.display = '';
  document.getElementById('bc-muscle').textContent = `${m.icon} ${m.name}`;
  document.getElementById('muscle-view-title').textContent = `${m.icon} ${m.name}`;
  renderExercises(m);
}

// ── EXERCISES ─────────────────────────────────────────────────
function openAddExercise() {
  document.getElementById('ex-name-inp').value = '';
  openModal('modal-ex');
  setTimeout(() => document.getElementById('ex-name-inp').focus(), 100);
}

function addExercise() {
  const name = document.getElementById('ex-name-inp').value.trim();
  if (!name) { showToast('Escribe el nombre'); return; }
  const p = profile();
  const m = p.muscles.find(m => m.id === activeMuscle);
  if (m.exercises.find(e => e.name.toLowerCase() === name.toLowerCase())) { showToast('Ya existe'); return; }
  m.exercises.push({ id: Date.now().toString(), name, sessions: [] });
  saveCurrentProfile();
  closeModal('modal-ex');
  renderExercises(m);
  showToast('Ejercicio añadido ✓');
}

function delExercise(exId) {
  if (!confirm('¿Eliminar ejercicio y su historial?')) return;
  const p = profile();
  const m = p.muscles.find(m => m.id === activeMuscle);
  m.exercises = m.exercises.filter(e => e.id !== exId);
  saveCurrentProfile();
  renderExercises(m);
  showToast('Eliminado');
}

function renderExercises(m) {
  const list = document.getElementById('exercise-list');
  if (!m.exercises.length) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="ei">${m.icon}</div>
        <h3>Sin ejercicios de ${m.name}</h3>
        <p>Pulsa "+ Ejercicio" para añadir.</p>
      </div>`;
    return;
  }
  list.innerHTML = '';
  m.exercises.forEach(ex => list.appendChild(buildExCard(ex)));
}

function buildExCard(ex) {
  const card = document.createElement('div');
  card.className = 'ex-card';
  card.id = `card-${ex.id}`;

  let bestKg = 0;
  ex.sessions.forEach(s => s.sets.forEach(set => { if (set.kg > bestKg) bestKg = set.kg; }));
  const bestBadge = bestKg ? `<span class="ex-best">↑ ${bestKg}kg</span>` : '';
  const last = ex.sessions.length ? ex.sessions[ex.sessions.length - 1] : null;
  const meta = ex.sessions.length ? `${ex.sessions.length} ses. · ${fmtDate(last.date)}` : 'Sin sesiones';

  card.innerHTML = `
    <div class="ex-card-header" onclick="toggleCard('${ex.id}')">
      <div class="ex-left">
        <div>
          <div class="ex-name">${ex.name}</div>
          <div class="ex-meta">${meta}</div>
        </div>
      </div>
      <div class="ex-right">
        ${bestBadge}
        <button class="btn-icon" onclick="event.stopPropagation();delExercise('${ex.id}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
          </svg>
        </button>
        <span class="ex-chevron">▼</span>
      </div>
    </div>
    <div class="ex-body">
      ${renderProgBars(ex)}
      <div class="session-form">
        <h4>Registrar sesión</h4>
        <div class="sets-area" id="sets-${ex.id}"></div>
        <div class="form-foot">
          <button class="add-set-link" onclick="addSetRow('${ex.id}')">+ Serie</button>
          <button class="btn btn-accent btn-sm" onclick="saveSession('${ex.id}')">Guardar sesión</button>
        </div>
      </div>
      <div class="sessions-log" id="log-${ex.id}">${renderLog(ex)}</div>
    </div>`;

  setTimeout(() => { addSetRow(ex.id); addSetRow(ex.id); addSetRow(ex.id); }, 0);
  return card;
}

function toggleCard(exId) {
  document.getElementById(`card-${exId}`).classList.toggle('open');
}

function addSetRow(exId) {
  const area = document.getElementById(`sets-${exId}`);
  const n = area.children.length + 1;
  const row = document.createElement('div');
  row.className = 'set-row';
  row.innerHTML = `
    <span class="set-num">${n}</span>
    <input type="number" placeholder="Reps" min="1" max="999" step="1">
    <input type="number" placeholder="Kg" min="0" max="999" step="0.5">
    <button class="btn-icon" onclick="removeSetRow(this,'${exId}')">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>`;
  area.appendChild(row);
  renumSets(exId);
}

function removeSetRow(btn, exId) { btn.closest('.set-row').remove(); renumSets(exId); }
function renumSets(exId) {
  [...document.getElementById(`sets-${exId}`).children].forEach((r, i) => r.querySelector('.set-num').textContent = i + 1);
}

function saveSession(exId) {
  const rows = [...document.getElementById(`sets-${exId}`).querySelectorAll('.set-row')];
  const sets = [];
  for (const row of rows) {
    const [ri, ki] = row.querySelectorAll('input');
    const reps = parseInt(ri.value), kg = parseFloat(ki.value);
    if (!isNaN(reps) && reps > 0) sets.push({ reps, kg: isNaN(kg) ? 0 : kg });
  }
  if (!sets.length) { showToast('Añade al menos una serie'); return; }
  const p = profile();
  const m = p.muscles.find(m => m.id === activeMuscle);
  const ex = m.exercises.find(e => e.id === exId);
  ex.sessions.push({ id: Date.now().toString(), date: new Date().toISOString(), sets });
  saveCurrentProfile();
  const card = document.getElementById(`card-${exId}`);
  const wasOpen = card.classList.contains('open');
  const newCard = buildExCard(ex);
  if (wasOpen) newCard.classList.add('open');
  card.replaceWith(newCard);
  showToast('Sesión guardada ✓');
}

function delSession(exId, sessionId) {
  const p = profile();
  const m = p.muscles.find(m => m.id === activeMuscle);
  const ex = m.exercises.find(e => e.id === exId);
  ex.sessions = ex.sessions.filter(s => s.id !== sessionId);
  saveCurrentProfile();
  const card = document.getElementById(`card-${exId}`);
  const wasOpen = card.classList.contains('open');
  const newCard = buildExCard(ex);
  if (wasOpen) newCard.classList.add('open');
  card.replaceWith(newCard);
  showToast('Sesión eliminada');
}

function renderProgBars(ex) {
  if (ex.sessions.length < 2) return '';
  const vols = ex.sessions.slice(-6).map(s => s.sets.reduce((a, set) => a + set.reps * set.kg, 0));
  const maxV = Math.max(...vols);
  if (maxV === 0) return '';
  return `<div class="prog-section">${vols.map((v, i) => `
    <div class="muscle-stat-item">
      <div class="prog-label">
        <span>S${ex.sessions.length - vols.length + i + 1}</span>
        <span>${Math.round(v)} vol.</span>
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${Math.round((v/maxV)*100)}%"></div></div>
    </div>`).join('')}</div>`;
}

function renderLog(ex) {
  if (!ex.sessions.length) return `<p style="font-size:11px;color:var(--muted);padding:6px 0">Sin sesiones aún.</p>`;
  return ex.sessions.slice().reverse().slice(0, 8).map(s => {
    const chips = s.sets.map((set, i) =>
      `<span class="set-chip">${i+1}. ${set.reps}×<span class="w">${set.kg}kg</span></span>`
    ).join('');
    return `<div class="session-entry">
      <div class="session-date">${fmtDate(s.date)}</div>
      <div style="flex:1"><div class="sets-chips">${chips}</div></div>
      <button class="btn-icon" onclick="delSession('${ex.id}','${s.id}')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>`;
  }).join('');
}

// ── STATS ──────────────────────────────────────────────────────
function renderStats() {
  const p = profile();
  const allEx = p.muscles.flatMap(m => m.exercises);
  const totalSessions = allEx.reduce((a, e) => a + e.sessions.length, 0);
  const totalSets = allEx.reduce((a, e) => a + e.sessions.reduce((b, s) => b + s.sets.length, 0), 0);
  const totalVol = Math.round(allEx.reduce((a, e) => a + e.sessions.reduce((b, s) => b + s.sets.reduce((c, set) => c + set.reps * set.kg, 0), 0), 0));
  const bestKg = Math.max(0, ...allEx.flatMap(e => e.sessions.flatMap(s => s.sets.map(set => set.kg))));
  const days = new Set(allEx.flatMap(e => e.sessions.map(s => s.date.slice(0, 10)))).size;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-v">${p.muscles.length}</div><div class="stat-l">Grupos</div></div>
    <div class="stat-card"><div class="stat-v">${allEx.length}</div><div class="stat-l">Ejercicios</div></div>
    <div class="stat-card"><div class="stat-v">${totalSessions}</div><div class="stat-l">Sesiones</div></div>
    <div class="stat-card"><div class="stat-v">${totalSets}</div><div class="stat-l">Series</div></div>
    <div class="stat-card"><div class="stat-v">${totalVol >= 1000 ? (totalVol/1000).toFixed(1)+'t' : totalVol+'kg'}</div><div class="stat-l">Volumen total</div></div>
    <div class="stat-card"><div class="stat-v">${bestKg > 0 ? bestKg+'kg' : '—'}</div><div class="stat-l">Mayor peso</div></div>
    <div class="stat-card"><div class="stat-v">${days}</div><div class="stat-l">Días activos</div></div>`;

  const entries = p.muscles.map(m => ({
    name: `${m.icon} ${m.name}`,
    sessions: m.exercises.reduce((a, e) => a + e.sessions.length, 0),
    exCount: m.exercises.length
  })).sort((a, b) => b.sessions - a.sessions);
  const maxS = entries.length ? Math.max(1, ...entries.map(e => e.sessions)) : 1;

  document.getElementById('muscle-stats').innerHTML = entries.length
    ? entries.map(e => `
      <div class="muscle-stat-item">
        <div class="mstat-label">
          <span>${e.name} <span style="color:var(--muted);font-size:11px">(${e.exCount} ej.)</span></span>
          <span>${e.sessions} ses.</span>
        </div>
        <div class="prog-track"><div class="prog-fill" style="width:${Math.round((e.sessions/maxS)*100)}%"></div></div>
      </div>`).join('')
    : `<p style="color:var(--muted);font-size:12px">Aún no hay datos.</p>`;
}

// ── RANKINGS ──────────────────────────────────────────────────
function getProfileStats(p) {
  const allEx = p.muscles.flatMap(m => m.exercises);
  const sessions = allEx.reduce((a, e) => a + e.sessions.length, 0);
  const vol = Math.round(allEx.reduce((a, e) => a + e.sessions.reduce((b, s) => b + s.sets.reduce((c, set) => c + set.reps * set.kg, 0), 0), 0));
  const bestKg = Math.max(0, ...allEx.flatMap(e => e.sessions.flatMap(s => s.sets.map(set => set.kg))));
  const days = new Set(allEx.flatMap(e => e.sessions.map(s => s.date.slice(0, 10)))).size;
  const totalSets = allEx.reduce((a, e) => a + e.sessions.reduce((b, s) => b + s.sets.length, 0), 0);
  return { sessions, vol, bestKg, days, totalSets };
}

function renderRankings() {
  const container = document.getElementById('ranking-grid');
  if (state.profiles.length < 2) {
    container.innerHTML = `<div class="empty-state"><div class="ei">🏆</div><h3>Faltan compañeros</h3><p>Necesitas al menos 2 perfiles<br>para ver los rankings.</p></div>`;
    return;
  }
  const data = state.profiles.map((p, idx) => ({ ...p, idx, color: colorFor(idx), stats: getProfileStats(p) }));
  const sections = [
    { icon: '💥', title: 'Volumen total', key: 'vol',      fmt: v => v >= 1000 ? (v/1000).toFixed(1)+'t' : v+'kg', sub: d => `${d.stats.sessions} sesiones` },
    { icon: '🗓️', title: 'Días activos',  key: 'days',     fmt: v => v + ' días',  sub: d => `${d.stats.totalSets} series` },
    { icon: '🏋️', title: 'Mayor peso',    key: 'bestKg',   fmt: v => v > 0 ? v+'kg' : '—', sub: d => `${d.stats.sessions} sesiones` },
    { icon: '🔁', title: 'Sesiones',      key: 'sessions', fmt: v => v + ' ses.',  sub: d => `${d.stats.totalSets} series` }
  ];
  const medals = ['🥇', '🥈', '🥉'];
  const posClass = ['gold', 'silver', 'bronze', ''];

  container.innerHTML = sections.map(sec => {
    const sorted = [...data].sort((a, b) => b.stats[sec.key] - a.stats[sec.key]);
    const maxVal = sorted[0].stats[sec.key] || 1;
    const rows = sorted.map((d, i) => `
      <div class="rank-row">
        <div class="rank-pos ${posClass[i] || ''}">${medals[i] || (i+1)+'º'}</div>
        <div class="rank-av" style="background:${d.color}">${d.name[0].toUpperCase()}</div>
        <div class="rank-info">
          <div class="rank-name">${d.name}</div>
          <div class="rank-sub">${sec.sub(d)}</div>
          <div class="rank-bar-wrap">
            <div class="rank-bar-bg">
              <div class="rank-bar-fill" style="background:${d.color};width:${maxVal > 0 ? Math.round((d.stats[sec.key]/maxVal)*100) : 0}%"></div>
            </div>
          </div>
        </div>
        <div class="rank-val">${sec.fmt(d.stats[sec.key])}</div>
      </div>`).join('');
    return `<div class="ranking-section"><h3>${sec.icon} <span>${sec.title}</span></h3>${rows}</div>`;
  }).join('');
}

// ── UTILS ─────────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o =>
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); })
);
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2400);
}

// ── INIT ──────────────────────────────────────────────────────
subscribeToProfiles();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(console.error);
  });
}
</script>
