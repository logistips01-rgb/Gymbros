<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0A1628"/>

  <!-- Red bottom accent -->
  <rect x="0" y="420" width="512" height="92" rx="0" fill="#E11D2E"/>
  <rect x="0" y="400" width="512" height="30" rx="0" fill="#E11D2E"/>

  <!-- Dumbbell bar -->
  <rect x="116" y="236" width="280" height="40" rx="8" fill="#ffffff"/>

  <!-- Left weight plate outer -->
  <rect x="60" y="176" width="72" height="160" rx="14" fill="#E11D2E"/>
  <!-- Left weight plate inner -->
  <rect x="76" y="196" width="40" height="120" rx="8" fill="#c0152a"/>

  <!-- Right weight plate outer -->
  <rect x="380" y="176" width="72" height="160" rx="14" fill="#E11D2E"/>
  <!-- Right weight plate inner -->
  <rect x="396" y="196" width="40" height="120" rx="8" fill="#c0152a"/>

  <!-- Left collar -->
  <rect x="128" y="206" width="32" height="100" rx="6" fill="#d0d8e8"/>
  <!-- Right collar -->
  <rect x="352" y="206" width="32" height="100" rx="6" fill="#d0d8e8"/>

  <!-- "GB" text -->
  <text x="256" y="388" font-family="Arial Black, Arial" font-weight="900"
        font-size="52" fill="#ffffff" text-anchor="middle"
        letter-spacing="6">GYMBROS</text>
</svg>
